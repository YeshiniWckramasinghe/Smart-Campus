spring.application.name=smart-campus

# Single-file configuration
# - Default DB is in-memory H2 (dev-friendly)
# - Override via environment variables for MySQL/production

# Datasource (defaults to H2)
spring.datasource.url=${DB_URL:jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Google OAuth2 (override via environment variables in real deployments)
# Spring Boot requires these to be non-empty if oauth2-client is on the classpath.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT
jwt.secret=${JWT_SECRET:smartcampus_dev_secret_key_change_me}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=${SERVER_PORT:8082}

spring.main.allow-circular-references=true
